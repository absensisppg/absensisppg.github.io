<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi Digital</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-decor" aria-hidden="true"></div>

  <div class="app">
    <header class="app-header">
      <div class="logo-badge">📋</div>
      <h1>Absensi Digital</h1>
      <p class="subtitle">SPPG Purbalingga Wetan 2</p>
      <p id="clock" class="clock"></p>
    </header>

    <main class="card">
      <div class="tabs">
        <button class="tab-btn active" data-mode="Masuk" type="button">
          <span class="tab-icon">🟢</span> Absen Masuk
        </button>
        <button class="tab-btn" data-mode="Pulang" type="button">
          <span class="tab-icon">🔴</span> Absen Pulang
        </button>
      </div>

      <form id="attendanceForm" novalidate>
        <div class="form-group">
          <label for="nama">Nama</label>
          <div class="combo-wrap" id="comboWrap">
            <span class="combo-icon">🔍</span>
            <input
              type="text"
              id="nama"
              name="nama"
              placeholder="Cari nama Anda..."
              autocomplete="off"
              aria-autocomplete="list"
              aria-expanded="false"
            >
            <button type="button" class="combo-clear" id="comboClear" hidden aria-label="Hapus pilihan">✕</button>
            <ul class="combo-list" id="comboList" hidden></ul>
          </div>
          <span class="error-msg" id="errNama"></span>
        </div>

        <div class="form-group" id="jabatanGroup" hidden>
          <label>Jabatan</label>
          <div class="jabatan-badge" id="jabatanBadge"></div>
        </div>

        <div class="form-group">
          <label for="foto">Foto Selfie</label>
          <div class="upload-box" id="uploadBox">
            <input type="file" id="foto" name="foto" accept="image/*" hidden>
            <div class="upload-placeholder" id="uploadPlaceholder">
              <span>📷</span>
              <p>Klik untuk ambil / unggah foto selfie</p>
            </div>
            <img id="previewImg" class="preview-img" hidden alt="Preview Selfie">
          </div>
          <span class="error-msg" id="errFoto"></span>
        </div>

        <div class="form-group">
          <label>Tanda Tangan Digital</label>
          <div class="signature-wrap">
            <canvas id="signatureCanvas"></canvas>
          </div>
          <button type="button" id="resetSign" class="btn-secondary">🗑️ Hapus Tanda Tangan</button>
          <span class="error-msg" id="errSign"></span>
        </div>

        <button type="submit" id="submitBtn" class="btn-primary">
          <span id="submitText">Kirim Absensi</span>
          <span id="submitSpinner" class="spinner" hidden></span>
        </button>
      </form>
    </main>

    <footer class="app-footer">
      <p>&copy; <span id="year"></span> Absensi Digital. Dibuat dengan ❤️</p>
    </footer>
  </div>

  <div id="toast" class="toast"></div>

  <div id="loadingOverlay" class="loading-overlay" hidden>
    <div class="loading-box">
      <div class="loading-spinner"></div>
      <p>Menyimpan absensi...</p>
      <span>Mohon tunggu, jangan tutup atau refresh halaman ini.</span>
    </div>
  </div>

  <script src="js/employees.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
